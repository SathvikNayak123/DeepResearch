name: Nightly Full Eval

on:
  # schedule disabled 2026-07-17: daily FRAMES-full + MuSiQue-full runs (up to
  # 360min each, real LLM calls) were too costly to run unattended every night.
  # Trigger manually via workflow_dispatch, or re-enable the cron below once
  # cost is under control.
  # schedule:
  #   - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write # commits the refreshed baseline on green

jobs:
  # FRAMES-100 with rerank on is the dominant wall-clock cost by a wide
  # margin — full Wikipedia articles chunk into dozens of candidates per
  # source vs. MuSiQue's pre-chunked short paragraphs (docs/RESULTS.md).
  # Split into its own job/runner so it gets the full 360min GH-hosted
  # ceiling to itself, instead of sharing one job's timeout with MuSiQue
  # and the reliability job — the combined single-job version measured
  # over 5h and was killed by the timeout twice before this split.
  eval-frames-full:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # GitHub-hosted runner hard cap; see comment above
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache HF datasets
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/datasets
          key: hf-datasets-${{ runner.os }}-v1

      - name: Cache reranker model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: bge-reranker-v2-m3-${{ runner.os }}-v1

      - name: Install deepresearch
        run: pip install -e ".[dev,eval]"

      - name: Warm reranker model cache
        timeout-minutes: 10
        run: python -c "from sentence_transformers import CrossEncoder; CrossEncoder('BAAI/bge-reranker-v2-m3')"

      - name: Run eval-full (100q FRAMES, local corpus)
        run: python -m eval.run_eval --benchmark frames --n 100 --seed 42 --database-url "sqlite+aiosqlite:///./frames_full.db"
        env:
          DEEPRESEARCH_LLM_PROVIDER: "openrouter"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPRESEARCH_PLANNER_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_WORKER_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_REFLECTION_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_SYNTHESIS_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_JUDGE_MODEL: "google/gemini-2.5-flash-lite"

      - name: Upload frames-full artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frames-full
          path: |
            frames_full.db
            results/*.json

  # MuSiQue-100 + the reliability job (20q x 3 repeats, also MuSiQue) share
  # this job — both are fast relative to FRAMES (docs/RESULTS.md), and
  # bundling the reliability job here (rather than a third parallel job)
  # keeps it simple since it draws from the same benchmark/corpus.
  eval-musique-full:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache HF datasets
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/datasets
          key: hf-datasets-${{ runner.os }}-v1

      - name: Cache reranker model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: bge-reranker-v2-m3-${{ runner.os }}-v1

      - name: Install deepresearch
        run: pip install -e ".[dev,eval]"

      - name: Warm reranker model cache
        timeout-minutes: 10
        run: python -c "from sentence_transformers import CrossEncoder; CrossEncoder('BAAI/bge-reranker-v2-m3')"

      - name: Run eval-full (100q MuSiQue, local corpus)
        run: python -m eval.run_eval --benchmark musique --n 100 --seed 42 --database-url "sqlite+aiosqlite:///./musique_full.db"
        env:
          DEEPRESEARCH_LLM_PROVIDER: "openrouter"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPRESEARCH_PLANNER_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_WORKER_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_REFLECTION_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_SYNTHESIS_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_JUDGE_MODEL: "google/gemini-2.5-flash-lite"

      # CLAUDE.md: "a 20-question subset must show an all-runs-consistent
      # (pass^k) rate reported alongside every accuracy number" — never cite
      # nightly's accuracy figures without this.
      - name: Run reliability job (20q x 3 repeats)
        run: python -m eval.run_eval --reliability --n 20 --repeats 3 --database-url "sqlite+aiosqlite:///./musique_full.db"
        env:
          DEEPRESEARCH_LLM_PROVIDER: "openrouter"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPRESEARCH_PLANNER_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_WORKER_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_REFLECTION_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_SYNTHESIS_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_JUDGE_MODEL: "google/gemini-2.5-flash-lite"

      - name: Upload musique-full artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: musique-full
          path: |
            musique_full.db
            results/*.json

  # Runs regardless of whether either eval job succeeded (if: always()) so
  # partial results/artifacts are still visible — dump_ci_baseline.py's own
  # all-green check (across both databases) is what actually decides
  # whether the baseline gets refreshed, matching CLAUDE.md's "no auto-gate,
  # never silently lower the bar" nightly policy.
  finalize:
    needs: [eval-frames-full, eval-musique-full]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deepresearch
        run: pip install -e ".[dev,eval]"

      - name: Download frames-full artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: frames-full
          path: frames-full

      - name: Download musique-full artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: musique-full
          path: musique-full

      # docs/DESIGN.md §6 / CLAUDE.md: "nightly: no auto-gate ... updates the
      # baseline only on green." Exit 1 here means at least one run across
      # either database didn't finish with status=completed (or a database
      # is missing entirely because its job crashed before uploading) — the
      # job stays green either way (no auto-gate), but the baseline commit
      # is skipped so a crashed/budget-exceeded/timed-out nightly can't
      # quietly lower the bar for every future PR.
      - name: Refresh baseline (only writes it if every run completed cleanly)
        id: refresh
        run: >
          python scripts/dump_ci_baseline.py
          --database-url "sqlite+aiosqlite:///./frames-full/frames_full.db"
          --database-url "sqlite+aiosqlite:///./musique-full/musique_full.db"
        continue-on-error: true

      - name: Commit updated baseline
        if: steps.refresh.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ci_baseline.json
          git diff --cached --quiet || git commit -m "chore: refresh nightly CI baseline"
          git diff --cached --quiet || git push
