name: Nightly Full Eval

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write # commits the refreshed baseline on green

jobs:
  eval-full:
    runs-on: ubuntu-latest
    # Bumped from 240: rerank now runs ON (see below), and RESULTS.md's own
    # measured FRAMES-100 wall-clock with rerank on was ~2.57h alone, before
    # MuSiQue-100 and the reliability job — 240min was too tight a margin.
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache HF datasets
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/datasets
          key: hf-datasets-${{ runner.os }}-v1

      # Own key/path, separate from the dataset cache — see pr-smoke.yml's
      # identical comment for why sharing a key silently prevents this from
      # ever actually getting cached.
      - name: Cache reranker model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: bge-reranker-v2-m3-${{ runner.os }}-v1

      - name: Install deepresearch
        run: pip install -e ".[dev,eval]"

      - name: Warm reranker model cache
        timeout-minutes: 10
        run: python -c "from sentence_transformers import CrossEncoder; CrossEncoder('BAAI/bge-reranker-v2-m3')"

      # Real OpenRouter key required — no fake/stub LLM fallback (see
      # pr-smoke.yml). Rerank runs ON (the config default) — see pr-smoke.yml's
      # comment for why disabling it isn't the no-op the old comment claimed.
      - name: Run eval-full (100q FRAMES + 100q MuSiQue, local corpus)
        run: python -m eval.run_eval --mode full --database-url "sqlite+aiosqlite:///./nightly_run.db"
        env:
          DEEPRESEARCH_LLM_PROVIDER: "openrouter"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPRESEARCH_PLANNER_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_WORKER_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_REFLECTION_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_SYNTHESIS_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_JUDGE_MODEL: "google/gemini-2.5-flash-lite"

      # CLAUDE.md: "a 20-question subset must show an all-runs-consistent
      # (pass^k) rate reported alongside every accuracy number" — never cite
      # nightly's accuracy figures without this.
      - name: Run reliability job (20q x 3 repeats)
        run: python -m eval.run_eval --reliability --n 20 --repeats 3 --database-url "sqlite+aiosqlite:///./nightly_run.db"
        env:
          DEEPRESEARCH_LLM_PROVIDER: "openrouter"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPRESEARCH_PLANNER_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_WORKER_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_REFLECTION_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_SYNTHESIS_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_JUDGE_MODEL: "google/gemini-2.5-flash-lite"

      - name: Upload metric-table artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-results
          path: results/*.json

      # docs/DESIGN.md §6 / CLAUDE.md: "nightly: no auto-gate ... updates the
      # baseline only on green." Exit 1 here means at least one run this
      # session didn't finish with status=completed — the job stays green
      # either way (no auto-gate), but the baseline commit is skipped so a
      # crashed/budget-exceeded nightly can't quietly lower the bar for
      # every future PR.
      - name: Refresh baseline (only writes it if every run completed cleanly)
        id: refresh
        run: python scripts/dump_ci_baseline.py --database-url "sqlite+aiosqlite:///./nightly_run.db"
        continue-on-error: true

      - name: Commit updated baseline
        if: steps.refresh.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ci_baseline.json
          git diff --cached --quiet || git commit -m "chore: refresh nightly CI baseline"
          git diff --cached --quiet || git push
