name: PR Smoke Eval

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  eval-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Speeds up repeat runs — the bge-reranker-v2-m3 cross-encoder and the
      # HF datasets (FRAMES/MuSiQue) are otherwise re-downloaded every run.
      - name: Cache HF datasets/models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-cache-${{ runner.os }}

      - name: Install deepresearch
        run: pip install -e ".[dev,eval]"

      # Real OpenRouter key required — eval/run_eval.py has no fake/stub LLM
      # fallback, per this project's own "every metric is real" premise.
      # Benchmarks still run against LocalCorpusBackend (no live Tavily
      # needed for FRAMES/MuSiQue); the corpus loaders separately reach the
      # public, unauthenticated HF Hub + Wikipedia APIs once to build the
      # fixed local corpus (docs/DESIGN.md decision row 5.1).
      # DEEPRESEARCH_RERANK_ENABLED=false: the bge-reranker-v2-m3 cross-encoder
      # (~1GB) hung 30+ min downloading from the HF model hub on GitHub-hosted
      # runners (runs #1/#2, 2026-07-02 — cancelled by hand, see docs/RESULTS.md).
      # Safe no-op here: candidate_pool_size == rerank_top_k == 6, so disabling
      # rerank selects the identical candidate set either way — zero effect on
      # any gated metric, just removes the flaky download.
      - name: Run eval-smoke (local corpus)
        run: python -m eval.run_eval --mode smoke --database-url "sqlite+aiosqlite:///./ci_run.db"
        env:
          DEEPRESEARCH_RERANK_ENABLED: "false"
          DEEPRESEARCH_LLM_PROVIDER: "openrouter"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPRESEARCH_PLANNER_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_WORKER_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_REFLECTION_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_SYNTHESIS_MODEL: "google/gemini-2.5-flash"
          DEEPRESEARCH_JUDGE_MODEL: "google/gemini-2.5-flash-lite"

      - name: CI regression gate
        id: gate
        run: python scripts/ci_gate.py --database-url "sqlite+aiosqlite:///./ci_run.db" --baseline results/ci_baseline.json --out results/ci_gate_comment.md
        continue-on-error: true

      - name: Write step summary
        if: always()
        run: cat results/ci_gate_comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post gate results as a PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('results/ci_gate_comment.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Upload gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-results
          path: results/ci_gate_comment.md

      - name: Fail the job if the gate found a regression
        if: steps.gate.outcome == 'failure'
        run: exit 1
