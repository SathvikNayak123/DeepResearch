name: PR Smoke Eval

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  eval-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Speeds up repeat runs — the bge-reranker-v2-m3 cross-encoder and the
      # HF datasets (FRAMES/MuSiQue) are otherwise re-downloaded every run.
      - name: Cache HF datasets/models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-cache-${{ runner.os }}

      - name: Install deepresearch
        run: pip install -e ".[dev,eval]"

      # No ANTHROPIC_API_KEY/TAVILY_API_KEY secret is set here on purpose —
      # eval/run_eval.py's make_llm() falls back to FakeLLMClient
      # automatically (loud banner in the log) so PR-smoke never needs a
      # paid key or judge-cost budget, per this session's brief ("no
      # external APIs in CI; judge calls cached/stubbed per design"). The
      # benchmark corpus loaders still reach the public, unauthenticated HF
      # Hub + Wikipedia APIs once to build the fixed local corpus
      # (docs/DESIGN.md decision row 5.1) — that's a one-time reproducible
      # ingestion step, not the paid/keyed vendor API this gate exists to
      # keep out of CI.
      - name: Run eval-smoke (local corpus)
        run: python -m eval.run_eval --mode smoke --database-url "sqlite+aiosqlite:///./ci_run.db"

      - name: CI regression gate
        id: gate
        run: python scripts/ci_gate.py --database-url "sqlite+aiosqlite:///./ci_run.db" --baseline results/ci_baseline.json --out results/ci_gate_comment.md
        continue-on-error: true

      - name: Write step summary
        if: always()
        run: cat results/ci_gate_comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post gate results as a PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('results/ci_gate_comment.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Upload gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-results
          path: results/ci_gate_comment.md

      - name: Fail the job if the gate found a regression
        if: steps.gate.outcome == 'failure'
        run: exit 1
