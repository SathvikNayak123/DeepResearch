# Docker Compose for the DeepResearch local stack.
#
# Langfuse runs on Langfuse Cloud (cloud.langfuse.com), not self-hosted here —
# see docs/DESIGN.md §6 for the reversal (self-hosted v3 needs its own
# Postgres + ClickHouse + Redis + S3-compatible storage on top of everything
# below, which bought nothing for local/demo use). Set LANGFUSE_HOST,
# LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY in .env from a Langfuse Cloud
# project.
#
# The app's own `redis` (search/fetch cache) and `postgres` (run store) are
# both live: DATABASE_URL/REDIS_URL point the app at these services here;
# locally without docker-compose they default to a SQLite file and
# localhost Redis respectively (see .env.example).

services:
  app:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://deepresearch:deepresearch@postgres:5432/deepresearch
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
    volumes:
      - ./trajectories:/app/trajectories

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deepresearch
      POSTGRES_PASSWORD: deepresearch
      POSTGRES_DB: deepresearch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Infra metrics (docs/DESIGN.md decision row 10): scrapes app:8000/metrics ---
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
